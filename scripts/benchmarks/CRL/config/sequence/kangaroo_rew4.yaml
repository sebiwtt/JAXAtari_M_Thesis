# from src/jaxatari/games/mods/kangaroo_mods.py. At most one mod per task.
#
ENV_ID: kangaroo
SEQUENCE: rew4
TASK_MODS:
  - []
  - ["life_loss_penalty"]    # base score - 200 per life lost
  - ["punch_only_scoring"]   # only punching monkeys / the falling coconut scores
  - ["reward_per_floor"]     # base + dense climb bonus + per-floor milestone (random floor = 0)
  - ["survival_reward"]      # +1/step - 200 per death, no base score (pure survival)

# --- More Options (alternate reward axes) ---
