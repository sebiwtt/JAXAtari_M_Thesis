# @package _global_
# Ordered single-mod tasks; index 0 must be the base task (no mods). Mod keys are
# from src/jaxatari/games/mods/kangaroo_mods.py. At most one mod per task.
ENV_ID: kangaroo
SEQUENCE: rew4
TASK_MODS:
  - []
  - ["life_loss_penalty"]    # score minus a penalty per life lost
  - ["reward_per_floor"]     # dense potential reward for climbing toward Joey
  - ["punch_only_scoring"]   # only punching monkeys / the falling coconut scores
  - ["reach_joey_only"]      # sparse: only reaching Joey at the top scores

# --- More Options ---
# fruit_only               # only fruit collection scores
# survival_reward          # +1 per step alive, ignores all scoring
