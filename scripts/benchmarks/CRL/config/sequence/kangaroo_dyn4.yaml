# @package _global_
# Ordered single-mod tasks; index 0 must be the base task (no mods). Mod keys are
# from src/jaxatari/games/mods/kangaroo_mods.py. At most one mod per task.
ENV_ID: kangaroo
SEQUENCE: dyn4
TASK_MODS:
  - []
  - ["change_kangaroo_speed"]  # player walks 2x faster horizontally
  - ["change_monkey_speed"]    # monkeys patrol 2x faster -> throw coconuts sooner/more
  - ["randomize_coconuts"]     # random head/foot throw height (duck vs jump unpredictable)
  - ["jump_gravity"]           # floatier, higher "low-gravity" jump arc

