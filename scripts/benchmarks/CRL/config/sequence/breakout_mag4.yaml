# @package _global_
# Ordered single-mod tasks; index 0 must be the base task (no mods). Mod keys are
# from src/jaxatari/games/mods/breakout_mods.py. At most one mod per task.
# Magnitude sequence: the same dynamics mod (ball speed) scaled to incrementally
# harder levels -- the ball's horizontal speed is 2x/3x/4x/5x its base.
ENV_ID: breakout
SEQUENCE: mag4
TASK_MODS:
  - []
  - ["ball_speed_x2"]
  - ["ball_speed_x3"]
  - ["ball_speed_x4"]
  - ["ball_speed_x5"]

# --- More Options ---
# faster_ball   # (single stronger step: vx up to 4)
# slower_paddle
