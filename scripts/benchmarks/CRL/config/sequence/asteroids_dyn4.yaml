# @package _global_
# Ordered single-mod tasks; index 0 must be the base task (no mods). Mod keys are
# from src/jaxatari/games/mods/asteroids_mods.py. At most one mod per task.
ENV_ID: asteroids
SEQUENCE: dyn4
TASK_MODS:
  - []
  - ["faster_asteroids"] # 3x speed -> (6,3) px/frame
  - ["faster_ship"] # 3x thrust + top speed
  - ["more_asteroids"] # dense field: 10 initial + 12/wave (vs 4 + 6)
  - ["ship_inertia"] # frictionless flight

# --- More Options ---
# randomize_asteroid_spawn  # (reshuffles the 4 starting asteroids' positions)
# slower_asteroids
# slower_ship
# dont_shoot
# instant_turn

