# =============================================================================
# Run identity / bookkeeping - fine to change per run, doesn't affect the algorithm.
# =============================================================================
EXP_NAME: ppo_crl_continual   # used to build run_name and checkpoint filenames/paths
TRACK: True                   # master wandb switch: also gates CAPTURE_VIDEO below (no wandb -> no video upload)
CAPTURE_VIDEO: False           # upload one final-rollout clip per task to wandb; only has effect if TRACK is also True

# Every task after task 0 resumes from carried-over params on a freshly-reset env, so
# charts-{task}/avg_episodic_return(_length) would otherwise show a hard 0 floor for the
# first few iterations - looking exactly like the agent forgot everything, when it's
# really just LogWrapper's per-env "last completed episode" bookkeeping warming back up.
# NaN shows as a gap instead of a fake dip.
NAN_UNTIL_FIRST_EPISODE: True

# =============================================================================
# Observation modality - PIXEL_BASED picks the network/observation pipeline; the two
# downscaling flags below only take effect when PIXEL_BASED is True (they're read
# unconditionally by make_env() but only consumed inside the pixel-wrapper branch).
# =============================================================================
PIXEL_BASED: False            # False = object-centric MLP_Network; True = pixel-CNN Network
NATIVE_DOWNSCALING: True      # pixel-only: use the env's native low-res render instead of resizing full-res frames
SMOOTH_IMAGE: False           # pixel-only: anti-alias when downscaling instead of nearest-neighbor

# =============================================================================
# CRL task sequence - the actual point of this file, edit freely per experiment.
# =============================================================================
ENV_ID: pong

# Ordered list of single-mod tasks. Index 0 must be the base task (no mods) since it
# has nothing to finetune from; every other entry is a single mod key from
# src/jaxatari/games/mods/pong_mods.py (PongEnvMod.REGISTRY). At most one mod per
# task - ppo_crl_continual.py asserts this since make_env() silently drops any
# TRAIN_MODS list longer than 1 during training (not during eval), which would
# otherwise fail as a confusing accuracy regression rather than a loud error.
TASK_MODS:
  - []
  - ["lazy_enemy"]
  - ["random_enemy"]

# Retention-matrix evaluation (fills R[i,j] for j <= i after each task i finishes).
# EVAL_SEED is held fixed across every cell of the matrix so differences in R
# reflect the agent's params, not eval-rollout noise; it is intentionally a
# separate seed from SEED (top-level, drives training/env-reset randomness).
EVAL_EPISODES: 10             # parallel eval episodes per matrix cell; matrix noise shrinks ~1/sqrt(this)
EVAL_SEED: 12345

# Off (default): only fill j <= i (backward transfer/retention - tasks already trained
# on), the standard lower-triangular CRL matrix. On: also fill j > i, i.e. after training
# through task i, additionally eval on tasks NOT yet trained on (forward transfer / zero-
# shot generalization to a future mod). Roughly doubles the number of eval() calls for a
# full task list, since it's now num_tasks^2 instead of num_tasks*(num_tasks+1)/2.
EVAL_FULL_MATRIX: False

# Fixed per-task training budget: identical TOTAL_TIMESTEPS (and therefore identical
# NUM_ITERATIONS, since that's derived as TOTAL_TIMESTEPS // (NUM_ENVS * NUM_STEPS))
# is used for every task in the sequence, so no task gets an unfair training-time
# advantage when comparing rows of the retention matrix.
TOTAL_TIMESTEPS: 100000000

# =============================================================================
# Compute / throughput knobs - trade off wall-clock time vs. how much experience is
# collected per PPO update. Reasonable to tune for your hardware (e.g. shrink
# NUM_ENVS if you're VRAM-limited, or all three for a quick smoke test), but they
# also change NUM_ITERATIONS (via BATCH_SIZE) and thus the LR-annealing schedule -
# don't change them mid-sequence between tasks.
# =============================================================================
NUM_ENVS: 8192                # parallel env instances (vmapped), the dominant memory cost
NUM_STEPS: 128                # rollout length per PPO iteration, per env

# =============================================================================
# Core PPO hyperparameters - standard CleanRL-style defaults. These govern the
# optimization algorithm itself, not the task/environment, so you normally should
# NOT need to change these per CRL task or per Pong mod. Revisit them only if you
# see actual optimization pathology (loss/KL blowing up, value loss not decreasing,
# entropy collapsing instantly, etc.) rather than as a first lever to pull.
# =============================================================================
LEARNING_RATE: 0.00025
ANNEAL_LR: True               # linearly decay LEARNING_RATE to 0 over NUM_ITERATIONS - resets to full LR each task,
                               # since train() rebuilds the schedule fresh from config["NUM_ITERATIONS") every call
GAMMA: 0.99                   # discount factor
GAE_LAMBDA: 0.95               # GAE bias/variance trade-off
NUM_MINIBATCHES: 4096          # BATCH_SIZE (NUM_ENVS * NUM_STEPS) is split into this many minibatches per epoch
UPDATE_EPOCHS: 2               # gradient passes over the same rollout batch per PPO iteration
NORM_ADV: True                 # normalize advantages within each minibatch
CLIP_COEF: 0.1                 # PPO policy-ratio clip range
ENT_COEF: 0.01                 # entropy bonus weight (encourages exploration)
VF_COEF: 0.5                   # value-loss weight in the combined loss
MAX_GRAD_NORM: 0.5             # global gradient-norm clip, applied before the Adam step
